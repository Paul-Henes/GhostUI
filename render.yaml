services:
  - type: web
    name: ghostui
    runtime: docker
    dockerfilePath: backend/Dockerfile
    rootDir: backend
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: BACKEND_PUBLIC_URL
        sync: false
